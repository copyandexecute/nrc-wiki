name: Deploy Crash-Checker (Pages)

on:
  push:
    branches: [main]
    paths:
      - 'entries/**'
      - 'site/**'
      - 'scripts/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build index.json
        run: node scripts/build-wiki.mjs

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp site/index.html site/app.js _site/
          cp scripts/matcher.mjs _site/
          cp index.json _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
